<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Direct Wire — peer-to-peer chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #0a0d10;
    --panel: #12171c;
    --panel-raised: #171d23;
    --line: #232b32;
    --amber: #ffb000;
    --amber-dim: #8a6200;
    --signal: #4ade80;
    --danger: #ff6b5e;
    --text: #e8e6e1;
    --text-dim: #7a8290;
    --text-faint: #4b525c;
    --display: 'Space Grotesk', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
    --body: 'Inter', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background: var(--ink);
    color: var(--text);
    font-family: var(--body);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background-image:
      radial-gradient(circle at 15% 10%, rgba(255,176,0,0.05), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(74,222,128,0.04), transparent 40%);
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  /* ---------- header ---------- */
  header{
    padding: 20px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:var(--display);
    font-weight:700;
    font-size:18px;
    letter-spacing:0.02em;
  }
  .brand .dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--text-faint);
    flex-shrink:0;
    transition: background .3s, box-shadow .3s;
  }
  .brand .dot.connecting{
    background: var(--amber);
    box-shadow: 0 0 0 0 rgba(255,176,0,.5);
    animation: pulse-amber 1.4s infinite;
  }
  .brand .dot.live{
    background: var(--signal);
    box-shadow: 0 0 0 0 rgba(74,222,128,.5);
    animation: pulse-green 2s infinite;
  }
  .brand .dot.dead{ background: var(--danger); }
  @keyframes pulse-amber{
    0%{box-shadow:0 0 0 0 rgba(255,176,0,.45);}
    70%{box-shadow:0 0 0 8px rgba(255,176,0,0);}
    100%{box-shadow:0 0 0 0 rgba(255,176,0,0);}
  }
  @keyframes pulse-green{
    0%{box-shadow:0 0 0 0 rgba(74,222,128,.45);}
    70%{box-shadow:0 0 0 8px rgba(74,222,128,0);}
    100%{box-shadow:0 0 0 0 rgba(74,222,128,0);}
  }
  .status-text{
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
  }

  main{
    flex:1;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding: 40px 20px;
    width:100%;
  }
  .stage{ width:100%; max-width:620px; }

  /* ---------- wire signature graphic ---------- */
  .wire-graphic{ width:100%; margin-bottom: 28px; }
  .wire-graphic svg{ width:100%; height:auto; display:block; }

  /* ---------- intro ---------- */
  .intro{ text-align:center; margin-bottom:34px; }
  .intro h1{
    font-family:var(--display);
    font-size:34px;
    font-weight:700;
    letter-spacing:-0.01em;
    margin-bottom:10px;
  }
  .intro p{
    color:var(--text-dim);
    font-size:15px;
    line-height:1.6;
    max-width:460px;
    margin:0 auto;
  }
  .intro p b{ color:var(--text); font-weight:600; }

  /* ---------- choice cards ---------- */
  .choices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-top:28px;
  }
  @media (max-width:520px){ .choices{ grid-template-columns:1fr; } }
  .choice-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:20px;
    text-align:left;
    cursor:pointer;
    transition: border-color .15s, transform .15s, background .15s;
    color:var(--text);
    font-family:var(--body);
  }
  .choice-card:hover{ border-color:var(--amber-dim); background:var(--panel-raised); transform:translateY(-1px); }
  .choice-card:focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }
  .choice-eyebrow{
    font-family:var(--mono);
    font-size:11px;
    color:var(--amber);
    letter-spacing:0.08em;
    margin-bottom:10px;
  }
  .choice-card h3{ font-family:var(--display); font-size:17px; margin-bottom:6px; }
  .choice-card p{ font-size:13px; color:var(--text-dim); line-height:1.5; }

  /* ---------- step panel ---------- */
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:26px;
  }
  .step-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:20px;
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-faint);
    letter-spacing:0.06em;
  }
  .step-row .seg{
    padding:4px 9px;
    border-radius:20px;
    border:1px solid var(--line);
  }
  .step-row .seg.active{ color:var(--amber); border-color:var(--amber-dim); }
  .step-row .seg.done{ color:var(--signal); border-color:var(--signal); }
  .step-row .arrow{ color:var(--text-faint); }

  .panel h2{ font-family:var(--display); font-size:20px; margin-bottom:8px; }
  .panel .sub{ color:var(--text-dim); font-size:13.5px; line-height:1.55; margin-bottom:18px; }

  textarea.code-box{
    width:100%;
    min-height:110px;
    max-height:220px;
    resize:vertical;
    background:var(--ink);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--text);
    font-family:var(--mono);
    font-size:12px;
    line-height:1.5;
    padding:12px;
    word-break:break-all;
  }
  textarea.code-box:focus-visible{ outline:2px solid var(--amber); outline-offset:1px; }
  textarea.code-box::placeholder{ color:var(--text-faint); }

  .row{ display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }

  button{
    font-family:var(--body);
    font-weight:600;
    font-size:13.5px;
    border-radius:7px;
    border:1px solid transparent;
    padding:10px 16px;
    cursor:pointer;
    transition: background .15s, border-color .15s, opacity .15s, transform .1s;
  }
  button:active{ transform: scale(0.98); }
  button:focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }
  button:disabled{ opacity:.4; cursor:not-allowed; }
  .btn-primary{ background:var(--amber); color:#1a1200; }
  .btn-primary:hover:not(:disabled){ background:#ffbe33; }
  .btn-ghost{ background:transparent; border-color:var(--line); color:var(--text); }
  .btn-ghost:hover:not(:disabled){ border-color:var(--text-dim); }
  .btn-back{ background:transparent; color:var(--text-dim); font-size:12.5px; padding:8px 4px; }
  .btn-back:hover{ color:var(--text); }

  .copied-flag{
    font-family:var(--mono);
    font-size:11px;
    color:var(--signal);
    align-self:center;
    opacity:0;
    transition:opacity .2s;
  }
  .copied-flag.show{ opacity:1; }

  .field-label{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:0.05em;
    margin-bottom:8px;
    display:block;
  }

  .waiting-line{
    display:flex; align-items:center; gap:8px;
    margin-top:16px;
    font-family:var(--mono);
    font-size:12px;
    color:var(--text-dim);
  }
  .waiting-line .spin{
    width:10px; height:10px; border-radius:50%;
    border:2px solid var(--line); border-top-color:var(--amber);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .diag-ok, .diag-warn{
    font-family:var(--mono);
    font-size:11px;
    line-height:1.5;
    padding:10px 12px;
    border-radius:7px;
    margin-top:14px;
  }
  .diag-ok{ color:var(--signal); background:rgba(74,222,128,0.08); border:1px solid rgba(74,222,128,0.25); }
  .diag-warn{ color:var(--amber); background:rgba(255,176,0,0.08); border:1px solid rgba(255,176,0,0.25); }
  .diag-log{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-faint);
    margin-top:10px;
  }
  .env-note{
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--text-dim);
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px 14px;
    line-height:1.6;
    margin-bottom:24px;
  }
  .env-note b{ color:var(--amber); }

  /* ---------- chat ---------- */
  .chat-wrap{
    width:100%;
    max-width:620px;
    display:flex;
    flex-direction:column;
    height: calc(100vh - 160px);
  }
  .chat-meta{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 4px 16px;
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-faint);
  }
  .chat-scroll{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:6px 4px 16px;
  }
  .bubble-row{ display:flex; }
  .bubble-row.me{ justify-content:flex-end; }
  .bubble-row.peer{ justify-content:flex-start; }
  .bubble-row.sys{ justify-content:center; }
  .bubble{
    max-width:72%;
    padding:10px 13px;
    border-radius:12px;
    font-size:14px;
    line-height:1.45;
    word-wrap:break-word;
  }
  .bubble .ts{
    display:block;
    font-family:var(--mono);
    font-size:10px;
    margin-top:5px;
    opacity:0.55;
  }
  .bubble-row.me .bubble{ background:var(--amber); color:#1a1200; border-bottom-right-radius:3px; }
  .bubble-row.peer .bubble{ background:var(--panel-raised); border:1px solid var(--line); border-bottom-left-radius:3px; }
  .bubble-row.sys .bubble{
    background:transparent; color:var(--text-faint);
    font-family:var(--mono); font-size:11px; padding:4px;
  }

  .composer{
    display:flex; gap:10px;
    border-top:1px solid var(--line);
    padding-top:14px;
  }
  .composer input{
    flex:1;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--text);
    font-family:var(--body);
    font-size:14px;
    padding:12px 14px;
  }
  .composer input:focus-visible{ outline:2px solid var(--amber); outline-offset:1px; }
  .composer input::placeholder{ color:var(--text-faint); }

  footer{
    text-align:center;
    padding:16px;
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--text-faint);
    flex-shrink:0;
  }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:8px; }
</style>
</head>
<body>

<header>
  <div class="brand"><span class="dot" id="statusDot"></span> DIRECT WIRE</div>
  <span class="status-text" id="statusText">no wire open</span>
</header>

<main><div class="stage" id="stage"></div></main>

<footer>no servers, no accounts &nbsp;·&nbsp; messages travel browser‑to‑browser over WebRTC</footer>

<script>
/* ============ elements & state ============ */
const stage = document.getElementById('stage');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

let pc = null;
let dc = null;
let role = null; // 'offerer' | 'answerer'

/* STUN helps two browsers behind NAT discover a direct path.
   TURN is a fallback relay for the ~15-20% of real-world networks (strict
   corporate firewalls, some mobile carriers, double-NAT) where a direct
   path can't be found at all. Either way, only encrypted packets pass
   through — nothing is ever readable, stored, or logged as a message. */
const RTC_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:openrelay.metered.ca:80' },
    { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
  ]
};

function setStatus(mode, text){
  statusDot.className = 'dot ' + mode;
  statusText.textContent = text;
}

/* ============ signaling helpers (manual copy/paste) ============ */
function waitForIceGathering(peer){
  return new Promise(resolve => {
    if(peer.iceGatheringState === 'complete'){ resolve(); return; }
    function check(){
      if(peer.iceGatheringState === 'complete'){
        peer.removeEventListener('icegatheringstatechange', check);
        resolve();
      }
    }
    peer.addEventListener('icegatheringstatechange', check);
    // safety timeout in case gathering stalls
    setTimeout(resolve, 6000);
  });
}
function encodeDesc(desc){ return btoa(JSON.stringify(desc)); }
function decodeDesc(str){
  try{ return JSON.parse(atob(str.trim())); }
  catch(e){ return null; }
}

/* ============ connectivity diagnostics ============
   Tracks what kind of ICE candidates actually got gathered, so failures
   are explainable instead of a black box:
   - host   = only works same-machine / same-LAN
   - srflx  = a STUN-discovered public path (works for most home NATs)
   - relay  = a TURN relay path (fallback for strict NATs/firewalls)
   If host is all we ever get, outbound UDP/TCP to the STUN/TURN servers
   is being blocked somewhere (very common inside sandboxed iframe previews). */
let gatheredCandidates = [];
function trackCandidates(peer){
  gatheredCandidates = [];
  peer.onicecandidate = (e) => {
    if(e.candidate && e.candidate.candidate){
      const parts = e.candidate.candidate.split(' ');
      const typIdx = parts.indexOf('typ');
      gatheredCandidates.push(typIdx !== -1 ? parts[typIdx+1] : 'unknown');
    }
  };
}
function candidateSummary(){
  const c = { host:0, srflx:0, relay:0, prflx:0, unknown:0 };
  gatheredCandidates.forEach(t => { if(c[t] !== undefined) c[t]++; else c.unknown++; });
  return c;
}
function candidateDiagHTML(){
  const c = candidateSummary();
  const total = c.host + c.srflx + c.relay + c.prflx;
  if(total === 0){
    return `<div class="diag-warn">No network paths were found at all — outbound connections may be blocked in this environment. If you're viewing this inside an embedded preview, download the file and open it in a normal browser tab instead.</div>`;
  }
  if(c.srflx === 0 && c.relay === 0){
    return `<div class="diag-warn">Only found ${c.host} local path${c.host===1?'':'s'} — no STUN or TURN paths. This will only work if both people are on the same machine or network. If you're viewing this inside an embedded preview, download the file and open it in a normal browser tab instead.</div>`;
  }
  return `<div class="diag-ok">Found ${c.host} local, ${c.srflx} STUN, ${c.relay} relay path${(c.host+c.srflx+c.relay)===1?'':'s'} — looking good.</div>`;
}

/* ============ wire graphic (signature element) ============ */
function wireGraphicSVG(state){
  // state: 'idle' | 'pending' | 'live'
  const midColor = state === 'live' ? 'var(--signal)' : (state === 'pending' ? 'var(--amber)' : 'var(--line)');
  const dash = state === 'idle' ? '' : `<animate attributeName="stroke-dashoffset" from="24" to="0" dur="0.9s" repeatCount="indefinite"/>`;
  return `
  <svg viewBox="0 0 600 120" xmlns="http://www.w3.org/2000/svg">
    <circle cx="60" cy="60" r="20" fill="var(--panel-raised)" stroke="${midColor}" stroke-width="2"/>
    <circle cx="60" cy="60" r="5" fill="${midColor}"/>
    <circle cx="540" cy="60" r="20" fill="var(--panel-raised)" stroke="${midColor}" stroke-width="2"/>
    <circle cx="540" cy="60" r="5" fill="${midColor}"/>
    <path d="M 80 60 Q 200 20, 300 60 T 520 60" fill="none" stroke="${midColor}" stroke-width="2" stroke-dasharray="6 6">
      ${dash}
    </path>
  </svg>`;
}

/* ============ views ============ */
function renderChoice(){
  role = null; pc = null; dc = null;
  setStatus('', 'no wire open');
  stage.innerHTML = `
    <div class="wire-graphic">${wireGraphicSVG('idle')}</div>
    <div class="env-note"><b>Before you start:</b> open this file directly in a real browser tab — download it and double-click it, or drag it into Chrome/Firefox/Safari. If you're viewing it inside an embedded preview panel, the connection step below may be blocked and will never finish.</div>
    <div class="intro">
      <h1>A wire between two machines</h1>
      <p>No account, no chat server, no inbox in the cloud. Your browser connects <b>directly</b> to theirs.
      To open the first connection, you'll trade one short code through any channel you already trust — text, email, whatever's handy.</p>
    </div>
    <div class="choices">
      <button class="choice-card" id="startBtn">
        <div class="choice-eyebrow">01 — OPEN A WIRE</div>
        <h3>Start a chat</h3>
        <p>Generate a connection code and send it to the person you want to talk to.</p>
      </button>
      <button class="choice-card" id="joinBtn">
        <div class="choice-eyebrow">01 — OPEN A WIRE</div>
        <h3>Join a chat</h3>
        <p>Paste the code someone sent you to answer and connect back.</p>
      </button>
    </div>
  `;
  document.getElementById('startBtn').onclick = beginOffer;
  document.getElementById('joinBtn').onclick = renderJoinPaste;
}

function stepRow(activeIndex){
  const labels = ['GENERATE', 'EXCHANGE', 'CONNECT'];
  return `<div class="step-row">` + labels.map((l,i) => {
    const cls = i < activeIndex ? 'done' : (i === activeIndex ? 'active' : '');
    const seg = `<span class="seg ${cls}">${String(i+1).padStart(2,'0')} ${l}</span>`;
    return i < labels.length-1 ? seg + `<span class="arrow">→</span>` : seg;
  }).join('') + `</div>`;
}

/* ---- offerer flow ---- */
async function beginOffer(){
  role = 'offerer';
  setStatus('connecting', 'generating code…');
  stage.innerHTML = `
    <div class="wire-graphic">${wireGraphicSVG('pending')}</div>
    <div class="panel">
      ${stepRow(0)}
      <h2>Generating your code</h2>
      <p class="sub">Setting up the connection and gathering network paths. This takes a moment.</p>
      <div class="waiting-line"><span class="spin"></span> working…</div>
    </div>
  `;

  pc = new RTCPeerConnection(RTC_CONFIG);
  trackCandidates(pc);
  dc = pc.createDataChannel('chat');
  wireDataChannel();

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await waitForIceGathering(pc);

  const code = encodeDesc(pc.localDescription);
  renderOfferReady(code);
}

function renderOfferReady(code){
  setStatus('connecting', 'waiting for reply code');
  stage.innerHTML = `
    <div class="wire-graphic">${wireGraphicSVG('pending')}</div>
    <div class="panel">
      ${stepRow(1)}
      <h2>Send this code</h2>
      <p class="sub">Copy it to the person you're chatting with — text, email, DM, anything. They'll paste it in on their end and send a reply code back.</p>
      <span class="field-label">YOUR CONNECTION CODE</span>
      <textarea class="code-box" readonly id="offerCode">${code}</textarea>
      <div class="row">
        <button class="btn-primary" id="copyBtn">Copy code</button>
        <span class="copied-flag" id="copiedFlag">copied ✓</span>
      </div>
      ${candidateDiagHTML()}

      <span class="field-label">PASTE THEIR REPLY CODE HERE</span>
      <textarea class="code-box" id="answerInput" placeholder="Paste the reply code you receive back…"></textarea>
      <div class="row">
        <button class="btn-primary" id="connectBtn">Connect</button>
        <button class="btn-ghost btn-back" id="backBtn">start over</button>
      </div>
    </div>
  `;
  document.getElementById('copyBtn').onclick = () => copyToClipboard(code, 'copiedFlag');
  document.getElementById('connectBtn').onclick = completeOffer;
  document.getElementById('backBtn').onclick = renderChoice;
}

async function completeOffer(){
  const raw = document.getElementById('answerInput').value;
  const desc = decodeDesc(raw);
  if(!desc || desc.type !== 'answer'){
    flashError('answerInput', 'That doesn\'t look like a valid reply code.');
    return;
  }
  await pc.setRemoteDescription(desc);
  renderConnecting();
}

/* ---- answerer flow ---- */
function renderJoinPaste(){
  role = 'answerer';
  setStatus('', 'waiting for a code to paste');
  stage.innerHTML = `
    <div class="wire-graphic">${wireGraphicSVG('idle')}</div>
    <div class="panel">
      ${stepRow(0)}
      <h2>Paste the code you received</h2>
      <p class="sub">Ask the person starting the chat for their connection code and paste it below.</p>
      <span class="field-label">THEIR CONNECTION CODE</span>
      <textarea class="code-box" id="offerInput" placeholder="Paste the connection code here…"></textarea>
      <div class="row">
        <button class="btn-primary" id="genAnswerBtn">Generate reply code</button>
        <button class="btn-ghost btn-back" id="backBtn">start over</button>
      </div>
    </div>
  `;
  document.getElementById('genAnswerBtn').onclick = generateAnswer;
  document.getElementById('backBtn').onclick = renderChoice;
}

async function generateAnswer(){
  const raw = document.getElementById('offerInput').value;
  const desc = decodeDesc(raw);
  if(!desc || desc.type !== 'offer'){
    flashError('offerInput', 'That doesn\'t look like a valid connection code.');
    return;
  }
  setStatus('connecting', 'generating reply code…');
  stage.innerHTML = `
    <div class="wire-graphic">${wireGraphicSVG('pending')}</div>
    <div class="panel">
      ${stepRow(1)}
      <h2>Generating your reply</h2>
      <p class="sub">Setting up the connection and gathering network paths.</p>
      <div class="waiting-line"><span class="spin"></span> working…</div>
    </div>
  `;

  pc = new RTCPeerConnection(RTC_CONFIG);
  trackCandidates(pc);
  pc.ondatachannel = (e) => { dc = e.channel; wireDataChannel(); };

  await pc.setRemoteDescription(desc);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await waitForIceGathering(pc);

  const code = encodeDesc(pc.localDescription);
  renderAnswerReady(code);
}

function renderAnswerReady(code){
  setStatus('connecting', 'waiting for connection…');
  stage.innerHTML = `
    <div class="wire-graphic">${wireGraphicSVG('pending')}</div>
    <div class="panel" id="answerWaitPanel">
      ${stepRow(2)}
      <h2>Send this reply code back</h2>
      <p class="sub">Copy it and send it back to them through the same channel. Once they paste it in, the wire opens.</p>
      <span class="field-label">YOUR REPLY CODE</span>
      <textarea class="code-box" readonly id="answerCode">${code}</textarea>
      <div class="row">
        <button class="btn-primary" id="copyBtn">Copy code</button>
        <span class="copied-flag" id="copiedFlag">copied ✓</span>
      </div>
      ${candidateDiagHTML()}
      <div class="waiting-line"><span class="spin"></span> waiting for them to connect…</div>
    </div>
  `;
  document.getElementById('copyBtn').onclick = () => copyToClipboard(code, 'copiedFlag');
  attachConnectWatch('answerWaitPanel', 25000);
}

function renderConnecting(){
  setStatus('connecting', 'connecting…');
  stage.innerHTML = `
    <div class="wire-graphic">${wireGraphicSVG('pending')}</div>
    <div class="panel" style="text-align:center;" id="connectPanel">
      ${stepRow(2)}
      <h2>Opening the wire</h2>
      <p class="sub">Establishing a direct path between the two browsers…</p>
      <div class="waiting-line" style="justify-content:center;"><span class="spin"></span> connecting…</div>
    </div>
  `;
  attachConnectWatch('connectPanel', 15000);
}

/* Watches the live RTCPeerConnection while a "connecting…" screen is shown.
   If the data channel doesn't open within the timeout, or the connection
   explicitly fails, surface a clear error instead of spinning forever. */
function attachConnectWatch(panelId, timeoutMs){
  if(!pc) return;
  const timer = setTimeout(() => {
    if(!dc || dc.readyState !== 'open') showConnectFailure(panelId);
  }, timeoutMs);

  const logState = () => {
    if(!pc) return;
    const el = document.getElementById(panelId + 'Log');
    if(el) el.textContent = `ice: ${pc.iceConnectionState} · connection: ${pc.connectionState}`;
    // also keep the header live once we're past this screen (e.g. mid-chat)
    if(pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed'){
      setStatus('dead', 'connection lost');
    }
  };

  pc.oniceconnectionstatechange = logState;
  pc.onconnectionstatechange = () => {
    if(!pc) return;
    logState();
    const state = pc.connectionState;
    if(state === 'connected'){
      clearTimeout(timer);
    } else if(state === 'failed' || state === 'closed'){
      clearTimeout(timer);
      showConnectFailure(panelId);
    }
  };

  // append a live log line under the panel if not already present
  const panel = document.getElementById(panelId);
  if(panel && !document.getElementById(panelId + 'Log')){
    const log = document.createElement('div');
    log.className = 'diag-log';
    log.id = panelId + 'Log';
    log.textContent = 'ice: new · connection: new';
    panel.appendChild(log);
  }
}

function showConnectFailure(panelId){
  const panel = document.getElementById(panelId);
  if(!panel) return; // already connected and moved on to chat
  const c = candidateSummary();
  const iceState = pc ? pc.iceConnectionState : 'unknown';
  let cause;
  if(c.host + c.srflx + c.relay === 0){
    cause = "No network paths were ever found on this side — outbound connections appear to be blocked here entirely.";
  } else if(c.relay === 0 && c.srflx === 0){
    cause = "Only local network paths were found on this side, so this will only work with someone on the same machine or network.";
  } else if(iceState === 'checking' || iceState === 'new'){
    cause = "Paths were found on this side but the two browsers never finished negotiating — the other side's code may not have finished gathering, or a firewall is blocking the traffic in transit.";
  } else {
    cause = "Both sides found network paths but a route between them never connected — most likely a strict firewall, VPN, or NAT on one end.";
  }
  panel.innerHTML = `
    ${stepRow(2)}
    <h2>Couldn't open the wire</h2>
    <p class="sub">${cause}</p>
    <div class="diag-warn" style="text-align:left;">
      This side found: ${c.host} local, ${c.srflx} STUN, ${c.relay} relay path${(c.host+c.srflx+c.relay)===1?'':'s'}.
      Last ICE state: ${iceState}.<br><br>
      If you're viewing this inside an embedded preview panel, download the file and open it directly in a normal browser tab — sandboxed previews often block this kind of connection. If that's not it, double-check the full code was pasted with nothing cut off, or try a different network.
    </div>
    <div class="row" style="justify-content:center;">
      <button class="btn-primary" id="retryBtn">Start over</button>
    </div>
  `;
  document.getElementById('retryBtn').onclick = renderChoice;
  setStatus('dead', 'connection failed');
}

/* ---- data channel wiring ---- */
let messages = [];
function wireDataChannel(){
  dc.onopen = () => { renderChat(); pushSystem('wire is open — messages go straight to the other browser'); };
  dc.onclose = () => { setStatus('dead', 'wire closed'); pushSystem('connection closed'); };
  dc.onerror = () => { setStatus('dead', 'connection error'); };
  dc.onmessage = (e) => {
    try{
      const payload = JSON.parse(e.data);
      pushMessage('peer', payload.text, payload.ts);
    }catch(err){}
  };
}

/* ============ chat UI ============ */
function renderChat(){
  setStatus('live', 'wire open — connected directly');
  stage.innerHTML = `<div class="chat-wrap">
    <div class="chat-meta"><span>PEER-TO-PEER SESSION</span><span id="msgCount">0 messages</span></div>
    <div class="chat-scroll" id="scroll"></div>
    <div class="composer">
      <input id="msgInput" type="text" placeholder="Type a message…" autocomplete="off" />
      <button class="btn-primary" id="sendBtn">Send</button>
    </div>
  </div>`;
  document.getElementById('sendBtn').onclick = sendCurrentMessage;
  document.getElementById('msgInput').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') sendCurrentMessage();
  });
  document.getElementById('msgInput').focus();
  renderMessages();
}

function sendCurrentMessage(){
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text || !dc || dc.readyState !== 'open') return;
  const ts = Date.now();
  dc.send(JSON.stringify({ text, ts }));
  pushMessage('me', text, ts);
  input.value = '';
  input.focus();
}

function pushMessage(who, text, ts){
  messages.push({ who, text, ts });
  renderMessages();
}
function pushSystem(text){
  messages.push({ who: 'sys', text, ts: Date.now() });
  renderMessages();
}
function renderMessages(){
  const scroll = document.getElementById('scroll');
  const count = document.getElementById('msgCount');
  if(!scroll) return;
  scroll.innerHTML = messages.map(m => {
    const time = new Date(m.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    if(m.who === 'sys'){
      return `<div class="bubble-row sys"><div class="bubble">${escapeHTML(m.text)}</div></div>`;
    }
    return `<div class="bubble-row ${m.who}"><div class="bubble">${escapeHTML(m.text)}<span class="ts">${time}</span></div></div>`;
  }).join('');
  if(count) count.textContent = messages.filter(m => m.who !== 'sys').length + ' messages';
  scroll.scrollTop = scroll.scrollHeight;
}

/* ============ small utils ============ */
function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function copyToClipboard(text, flagId){
  navigator.clipboard.writeText(text).then(() => {
    const flag = document.getElementById(flagId);
    flag.classList.add('show');
    setTimeout(() => flag.classList.remove('show'), 1500);
  }).catch(() => {
    // fallback: select the textarea text
    const area = flagId === 'copiedFlag' ? document.querySelector('textarea[readonly]') : null;
    if(area){ area.select(); document.execCommand('copy'); }
  });
}
function flashError(fieldId, msg){
  const el = document.getElementById(fieldId);
  el.style.borderColor = 'var(--danger)';
  const old = el.placeholder;
  el.placeholder = msg;
  setTimeout(() => { el.style.borderColor = ''; el.placeholder = old; }, 2000);
}

/* ============ boot ============ */
renderChoice();
</script>
</body>
</html>
